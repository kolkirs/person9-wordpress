name: Deploy to server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 45.128.52.230
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/person9
            git pull origin main
            systemctl reload nginx
